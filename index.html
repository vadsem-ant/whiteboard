<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Whiteboard</title>
<style>
  :root { --bar-h: 52px; }
  * { margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; }
  input { -webkit-user-select: text; user-select: text; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none;
    background: #1c1c1e;
    -webkit-user-select: none !important; user-select: none !important;
    -webkit-touch-callout: none !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
    display: flex; align-items: center; gap: 8px; padding: 0 10px;
    background: #1c1c1e; color: #eee; z-index: 10;
    padding-top: env(safe-area-inset-top);
    height: calc(var(--bar-h) + env(safe-area-inset-top));
  }
  #toolbar button, #toolbar select {
    height: 36px; min-width: 36px; border: none; border-radius: 8px;
    background: #3a3a3c; color: #eee; font-size: 15px; padding: 0 10px;
    touch-action: manipulation;
  }
  #toolbar button.active { background: #0a84ff; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
    flex: none; touch-action: manipulation; }
  .swatch.active { border-color: #fff; }
  #spacer { flex: 1; }
  #status { font-size: 12px; color: #98989d; max-width: 200px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  #syncBtn { background: #0a84ff; font-weight: 600; }
  #syncBtn.dirty { background: #ff9f0a; }
  #board { position: fixed; left: 0; touch-action: none; background: #fff; }
  #settings {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 20;
    display: none; align-items: center; justify-content: center;
  }
  #settings.open { display: flex; }
  #settings .panel {
    background: #2c2c2e; color: #eee; border-radius: 14px; padding: 22px;
    width: min(440px, 92vw); display: flex; flex-direction: column; gap: 12px;
  }
  #settings label { font-size: 13px; color: #98989d; }
  #settings input {
    width: 100%; height: 40px; border-radius: 8px; border: 1px solid #48484a;
    background: #1c1c1e; color: #eee; padding: 0 10px; font-size: 15px;
  }
  #settings .row { display: flex; gap: 10px; justify-content: flex-end; }
  #settings button { height: 38px; padding: 0 16px; border: none; border-radius: 8px;
    background: #0a84ff; color: #fff; font-size: 15px; }
  #settings button.secondary { background: #3a3a3c; }
  #miniToggle {
    position: fixed; top: calc(10px + env(safe-area-inset-top)); right: 14px;
    z-index: 12; width: 48px; height: 48px; border-radius: 50%;
    background: rgba(58,58,60,.85); color: #fff; font-size: 22px; border: none;
    display: none; touch-action: manipulation;
  }
  #barHandle {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    z-index: 12; width: 72px; height: 20px; border: none;
    border-radius: 0 0 12px 12px; background: rgba(58,58,60,.65);
    display: none; touch-action: manipulation;
  }
  body.mini #toolbar { display: none; }
  body.mini.showbar #toolbar { display: flex; }
  #miniSync {
    position: fixed; top: calc(66px + env(safe-area-inset-top)); right: 14px;
    z-index: 12; width: 48px; height: 48px; border-radius: 50%;
    background: rgba(10,132,255,.9); color: #fff; font-size: 20px; border: none;
    display: none; touch-action: manipulation;
  }
  #miniSync.dirty { background: rgba(255,159,10,.95); }
  body.mini #miniToggle, body.mini #barHandle, body.mini #miniSync { display: block; }
  body.mini.showbar #miniToggle, body.mini.showbar #miniSync { display: none; }
  #toast {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: rgba(28,28,30,.85); color: #fff; font-size: 22px; font-weight: 600;
    padding: 14px 26px; border-radius: 14px; z-index: 15; pointer-events: none;
    opacity: 0; transition: opacity .15s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="penBtn" class="active" title="Pen">✏️</button>
  <button id="eraserBtn" title="Eraser">◻️</button>
  <div class="swatch active" data-color="#111111" style="background:#111111"></div>
  <div class="swatch" data-color="#d70015" style="background:#d70015"></div>
  <div class="swatch" data-color="#0a84ff" style="background:#0a84ff"></div>
  <div class="swatch" data-color="#1db954" style="background:#1db954"></div>
  <select id="widthSel">
    <option value="2">Fine</option>
    <option value="3.5" selected>Medium</option>
    <option value="7">Thick</option>
  </select>
  <button id="zoomBtn" title="Reset zoom">100%</button>
  <button id="centerBtn" title="Center content">⌖</button>
  <button id="undoBtn" title="Undo">↩︎</button>
  <button id="clearBtn" title="Clear">🗑</button>
  <div id="spacer"></div>
  <span id="status">v13</span>
  <button id="syncBtn">Sync</button>
  <button id="fsBtn" title="Full screen">⛶</button>
  <button id="gearBtn" title="Settings">⚙️</button>
</div>
<canvas id="board"></canvas>
<div id="toast"></div>
<button id="miniToggle">✏️</button>
<button id="miniSync">↑</button>
<button id="barHandle"></button>

<div id="settings">
  <div class="panel">
    <b>Sync settings</b>
    <label>GitHub repo (owner/name)</label>
    <input id="repoInp" placeholder="owner/repo (private recommended)" autocapitalize="none">
    <label>Fine-grained PAT (Contents: read/write on that repo only)</label>
    <input id="tokenInp" type="password" placeholder="github_pat_..." autocapitalize="none">
    <label>Board name</label>
    <input id="boardInp" placeholder="board" autocapitalize="none">
    <div class="row">
      <button class="secondary" id="closeSettings">Cancel</button>
      <button id="saveSettings">Save</button>
    </div>
  </div>
</div>

<script>
"use strict";
// ---------- state ----------
const cfg = {
  repo:  localStorage.getItem("wb_repo")  || "",
  token: localStorage.getItem("wb_token") || "",
  board: localStorage.getItem("wb_board") || "board",
};
let strokes = [];        // [{color, width, eraser, pts:[[x,y,p],...]}]
let current = null;
let tool = "pen";
let color = "#111111";
let baseWidth = 3.5;
let dirty = false;
let remoteSha = { json: null, png: null };

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");
const syncBtn = document.getElementById("syncBtn");

// ---------- view transform (world <-> screen) ----------
let view = { x: 0, y: 0, s: 1 };
function applyView() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr * view.s, 0, 0, dpr * view.s,
                   -view.x * dpr * view.s, -view.y * dpr * view.s);
}

// ---------- canvas sizing ----------
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const tb = document.getElementById("toolbar");
  tb.style.top = (window.visualViewport ? visualViewport.offsetTop : 0) + "px";
  const mini = document.body.classList.contains("mini");
  const top = mini ? 0 : tb.getBoundingClientRect().bottom;
  const vw = (window.visualViewport ? visualViewport.width  : window.innerWidth);
  const vh = (window.visualViewport ? visualViewport.height : window.innerHeight);
  const w = Math.round(vw), h = Math.round(vh - top);
  canvas.style.top = top + "px";
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  applyView();
  redraw();
}
window.addEventListener("resize", resize);

// ---------- drawing ----------
function drawStroke(s, c) {
  c = c || ctx;
  if (!s.pts.length) return;
  c.save();
  c.globalCompositeOperation = s.eraser ? "destination-out" : "source-over";
  c.strokeStyle = s.color;
  c.lineCap = "round";
  c.lineJoin = "round";
  if (s.pts.length === 1) {
    const [x, y, p] = s.pts[0];
    c.beginPath();
    c.arc(x, y, (s.width * (0.4 + p)) / 2, 0, Math.PI * 2);
    c.fillStyle = s.color;
    c.fill();
    c.restore();
    return;
  }
  for (let i = 1; i < s.pts.length; i++) {
    const [x0, y0, p0] = s.pts[i - 1];
    const [x1, y1, p1] = s.pts[i];
    c.beginPath();
    c.lineWidth = s.eraser ? s.width * 6 : s.width * (0.4 + (p0 + p1) / 2);
    c.moveTo(x0, y0);
    c.lineTo(x1, y1);
    c.stroke();
  }
  c.restore();
}
function redraw() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  applyView();
  for (const s of strokes) drawStroke(s);
}

// ---------- pointer input ----------
function pos(ev) {
  const p = (ev.pointerType === "pen" && ev.pressure > 0) ? ev.pressure : 0.6;
  const r = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const sx = (canvas.width / dpr) / r.width;
  const sy = (canvas.height / dpr) / r.height;
  const x = ((ev.clientX - r.left) * sx) / view.s + view.x;
  const y = ((ev.clientY - r.top) * sy) / view.s + view.y;
  return [+x.toFixed(1), +y.toFixed(1), +p.toFixed(2)];
}
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 550);
}
function setTool(t) {
  tool = t;
  penBtn.classList.toggle("active", t === "pen");
  eraserBtn.classList.toggle("active", t === "eraser");
  document.getElementById("miniToggle").textContent = (t === "pen") ? "✏️" : "◻️";
}
function toggleTool() {
  setTool(tool === "pen" ? "eraser" : "pen");
  toast(tool === "pen" ? "✏️ Pen" : "◻️ Eraser");
}
let nav = null;
function tpt(t) {
  const r = canvas.getBoundingClientRect();
  const sx = (canvas.width / (window.devicePixelRatio || 1)) / r.width;
  return [(t.clientX - r.left) * sx, (t.clientY - r.top) * sx];
}
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    if (current) { current = null; redraw(); }
    const [x0, y0] = tpt(e.touches[0]), [x1, y1] = tpt(e.touches[1]);
    nav = { d0: Math.hypot(x1 - x0, y1 - y0), s0: view.s,
            wx: ((x0 + x1) / 2) / view.s + view.x,
            wy: ((y0 + y1) / 2) / view.s + view.y };
  } else if (e.touches.length > 2) nav = null;
}, { passive: false });
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (nav && e.touches.length === 2) {
    const [x0, y0] = tpt(e.touches[0]), [x1, y1] = tpt(e.touches[1]);
    const d = Math.hypot(x1 - x0, y1 - y0);
    if (nav.d0 > 30) view.s = Math.min(8, Math.max(0.2, nav.s0 * d / nav.d0));
    view.x = nav.wx - ((x0 + x1) / 2) / view.s;
    view.y = nav.wy - ((y0 + y1) / 2) / view.s;
    applyView(); redraw(); updateZoomBtn();
  }
}, { passive: false });
canvas.addEventListener("touchend", (e) => {
  if (e.touches.length < 2) nav = null;
}, { passive: true });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
document.addEventListener("selectstart", (e) => {
  if (e.target && e.target.tagName === "INPUT") return;
  e.preventDefault();
});
document.body.addEventListener("touchstart", (e) => {
  // outside toolbar/settings, no finger touch does anything
  if (!e.target.closest("#toolbar") && !e.target.closest("#settings") &&
      !e.target.closest("#miniToggle") && !e.target.closest("#barHandle") &&
      !e.target.closest("#miniSync")) e.preventDefault();
}, { passive: false });
document.addEventListener("selectionchange", () => {
  const s = document.getSelection();
  if (s && !s.isCollapsed) s.removeAllRanges();
});
function ensureSized() {
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  if (Math.abs(canvas.width - r.width * dpr) > 1 || Math.abs(canvas.height - r.height * dpr) > 1) resize();
}
let penSeen = localStorage.getItem("wb_pen_seen") === "1";
let lastPenTs = 0;
let penDown = false;
function notePen(ev) {
  if (ev.pointerType === "pen") {
    lastPenTs = Date.now();
    if (!penSeen) { penSeen = true; localStorage.setItem("wb_pen_seen", "1"); }
  }
}
canvas.addEventListener("pointerdown", (ev) => {
  notePen(ev);
  // Once a Pencil has ever been used on this device, fingers NEVER draw or
  // erase — palm contact is fully inert (toolbar still works).
  if (ev.pointerType === "touch" && (penSeen || tool === "pen")) return;
  if (ev.pointerType === "pen") penDown = true;
  ensureSized(); // palm rejection: finger pans nothing, pencil draws
  canvas.setPointerCapture(ev.pointerId);
  current = { color, width: baseWidth, eraser: tool === "eraser", pts: [pos(ev)] };
  ev.preventDefault();
});
canvas.addEventListener("pointermove", (ev) => {
  notePen(ev);
  if (!current) return;
  const events = ev.getCoalescedEvents ? ev.getCoalescedEvents() : [ev];
  for (const e of events) current.pts.push(pos(e));
  // incremental draw of the new tail
  const tail = { ...current, pts: current.pts.slice(-events.length - 1) };
  drawStroke(tail);
  ev.preventDefault();
});
function endStroke(ev) {
  if (ev && ev.pointerType === "pen") { penDown = false; lastPenTs = Date.now(); }
  if (!current) return;
  strokes.push(current);
  current = null;
  setDirty(true);
}
canvas.addEventListener("pointerup", endStroke);
canvas.addEventListener("pointercancel", endStroke);

// ---------- toolbar ----------
const penBtn = document.getElementById("penBtn");
const eraserBtn = document.getElementById("eraserBtn");
penBtn.onclick = () => setTool("pen");
eraserBtn.onclick = () => setTool("eraser");
document.querySelectorAll(".swatch").forEach((el) => {
  el.onclick = () => {
    document.querySelectorAll(".swatch").forEach((s) => s.classList.remove("active"));
    el.classList.add("active");
    color = el.dataset.color;
    setTool("pen");
  };
});
document.getElementById("widthSel").onchange = (e) => { baseWidth = +e.target.value; };
const zoomBtn = document.getElementById("zoomBtn");
function updateZoomBtn() { zoomBtn.textContent = Math.round(view.s * 100) + "%"; }
zoomBtn.onclick = () => {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  const wx = view.x + cw / (2 * view.s), wy = view.y + ch / (2 * view.s);
  view.s = 1;
  view.x = wx - cw / 2; view.y = wy - ch / 2;
  applyView(); redraw(); updateZoomBtn();
};
function contentBBox() {
  let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity, any = false;
  for (const s of strokes) {
    if (s.eraser) continue;
    for (const p of s.pts) {
      any = true;
      if (p[0] < minx) minx = p[0];
      if (p[0] > maxx) maxx = p[0];
      if (p[1] < miny) miny = p[1];
      if (p[1] > maxy) maxy = p[1];
    }
  }
  return any ? { minx, miny, maxx, maxy } : null;
}
function centerContent() {
  const bb = contentBBox();
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  if (!bb) { view.x = -cw / 2; view.y = -ch / 2; }
  else {
    view.x = (bb.minx + bb.maxx) / 2 - cw / (2 * view.s);
    view.y = (bb.miny + bb.maxy) / 2 - ch / (2 * view.s);
  }
  applyView(); redraw(); updateZoomBtn();
}
document.getElementById("centerBtn").onclick = centerContent;
document.getElementById("undoBtn").onclick = () => { strokes.pop(); redraw(); setDirty(true); };
document.getElementById("clearBtn").onclick = () => {
  if (strokes.length && !confirm("Clear the whole board?")) return;
  strokes = []; redraw(); setDirty(true);
};

// ---------- settings ----------
const settings = document.getElementById("settings");
const fsBtn = document.getElementById("fsBtn");
const docEl = document.documentElement;
const fsSupported = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
if (!fsSupported || navigator.standalone) fsBtn.style.display = "none";
fsBtn.onclick = () => {
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (fsEl) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (docEl.requestFullscreen || docEl.webkitRequestFullscreen).call(docEl);
  }
};
const miniToggle = document.getElementById("miniToggle");
const barHandle = document.getElementById("barHandle");
miniToggle.onclick = () => toggleTool();
document.getElementById("miniSync").onclick = sync;
barHandle.onclick = () => { document.body.classList.toggle("showbar"); resize(); };
function onFsChange() {
  const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.body.classList.toggle("mini", fs);
  document.body.classList.remove("showbar");
  resize(); setTimeout(resize, 350);
}
document.addEventListener("fullscreenchange", onFsChange);
document.addEventListener("webkitfullscreenchange", onFsChange);
document.getElementById("gearBtn").onclick = () => {
  document.getElementById("repoInp").value = cfg.repo;
  document.getElementById("tokenInp").value = cfg.token;
  document.getElementById("boardInp").value = cfg.board;
  settings.classList.add("open");
};
document.getElementById("closeSettings").onclick = () => settings.classList.remove("open");
document.getElementById("saveSettings").onclick = () => {
  cfg.repo = document.getElementById("repoInp").value.trim();
  cfg.token = document.getElementById("tokenInp").value.trim();
  cfg.board = document.getElementById("boardInp").value.trim() || "board";
  localStorage.setItem("wb_repo", cfg.repo);
  localStorage.setItem("wb_token", cfg.token);
  localStorage.setItem("wb_board", cfg.board);
  settings.classList.remove("open");
  loadBoard();
};

// ---------- GitHub sync ----------
function setStatus(msg) { statusEl.textContent = msg; }
function setDirty(d) {
  dirty = d;
  syncBtn.classList.toggle("dirty", d);
  syncBtn.textContent = d ? "Sync ●" : "Sync";
  document.getElementById("miniSync").classList.toggle("dirty", d);
}
function api(path, opts = {}) {
  return fetch(`https://api.github.com/repos/${cfg.repo}/${path}`, {
    ...opts,
    headers: {
      Authorization: `Bearer ${cfg.token}`,
      Accept: "application/vnd.github+json",
      ...(opts.headers || {}),
    },
  });
}
async function getSha(path) {
  const r = await api(`contents/${path}?ref=main&t=${Date.now()}`, { cache: "no-store" });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET ${path}: ${r.status}`);
  return (await r.json()).sha;
}
async function putFile(path, base64Content, sha, message) {
  const body = { message, content: base64Content, branch: "main" };
  if (sha) body.sha = sha;
  const r = await api(`contents/${path}`, { method: "PUT", body: JSON.stringify(body) });
  if (!r.ok) throw new Error(`PUT ${path}: ${r.status} ${(await r.text()).slice(0, 120)}`);
  return (await r.json()).content.sha;
}
function canvasPNG() {
  const bb = contentBBox();
  const dpr = window.devicePixelRatio || 1;
  let x0, y0, w, h;
  if (bb) {
    const m = 40;
    x0 = bb.minx - m; y0 = bb.miny - m;
    w = bb.maxx - bb.minx + 2 * m; h = bb.maxy - bb.miny + 2 * m;
  } else {
    x0 = view.x; y0 = view.y;
    w = canvas.width / dpr / view.s; h = canvas.height / dpr / view.s;
  }
  const scale = Math.min(2, 4096 / w, 4096 / h);
  const W = Math.max(1, Math.round(w * scale)), H = Math.max(1, Math.round(h * scale));
  const layer = document.createElement("canvas");
  layer.width = W; layer.height = H;
  const lctx = layer.getContext("2d");
  lctx.setTransform(scale, 0, 0, scale, -x0 * scale, -y0 * scale);
  for (const s of strokes) drawStroke(s, lctx);
  const out = document.createElement("canvas");
  out.width = W; out.height = H;
  const octx = out.getContext("2d");
  octx.fillStyle = "#fff";
  octx.fillRect(0, 0, W, H);
  octx.drawImage(layer, 0, 0);
  return out.toDataURL("image/png").split(",")[1];
}

async function sync() {
  if (!cfg.token || !cfg.repo) { settings.classList.add("open"); return; }
  syncBtn.disabled = true;
  setStatus("syncing…");
  try {
    const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
    const meta = {
      board: cfg.board, updated: new Date().toISOString(),
      viewport: canvas.getBoundingClientRect(),
      dpr: window.devicePixelRatio || 1, strokes,
    };
    const jsonB64 = btoa(unescape(encodeURIComponent(JSON.stringify(meta))));
    remoteSha.json = await putFile(`boards/${cfg.board}.json`, jsonB64,
      await getSha(`boards/${cfg.board}.json`), `${cfg.board}: strokes @ ${stamp}`);
    remoteSha.png = await putFile(`boards/${cfg.board}.png`, canvasPNG(),
      await getSha(`boards/${cfg.board}.png`), `${cfg.board}: png @ ${stamp}`);
    setDirty(false);
    setStatus(`synced ${new Date().toLocaleTimeString()}`);
  } catch (e) {
    setStatus(`sync failed: ${e.message}`);
  } finally {
    syncBtn.disabled = false;
  }
}
syncBtn.onclick = sync;

async function loadBoard() {
  if (!cfg.token || !cfg.repo) { setStatus("set repo in ⚙️"); return; }
  setStatus("loading…");
  try {
    const r = await api(`contents/boards/${cfg.board}.json?ref=main&t=${Date.now()}`, {
      cache: "no-store",
      headers: { Accept: "application/vnd.github.raw+json" },
    });
    if (r.status === 404) { setStatus("new board"); return; }
    if (!r.ok) throw new Error(`load: ${r.status}`);
    const meta = await r.json();
    strokes = meta.strokes || [];
    centerContent();
    setDirty(false);
    setStatus(`loaded (${strokes.length} strokes)`);
  } catch (e) {
    setStatus(`load failed: ${e.message}`);
  }
}

// ---------- boot ----------
document.addEventListener("gesturestart", (e) => e.preventDefault());
document.addEventListener("gesturechange", (e) => e.preventDefault());
document.addEventListener("dblclick", (e) => e.preventDefault());
if (window.visualViewport) {
  visualViewport.addEventListener("resize", resize);
  visualViewport.addEventListener("scroll", resize);
}
window.addEventListener("orientationchange", () => { resize(); setTimeout(resize, 350); });
resize();
loadBoard();
window.addEventListener("beforeunload", (e) => { if (dirty) e.preventDefault(); });
</script>
</body>
